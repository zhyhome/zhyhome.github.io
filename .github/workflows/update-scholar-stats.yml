name: Update Scholar Stats

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

jobs:
  update-scholar-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch scholar stats
        run: python scripts/fetch_scholar_stats.py

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/scholar-stats.json
          git diff --cached --quiet || git commit -m "Update scholar stats"
          git push
